<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-DASH v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        .sidebar-item { color: #64748b; transition: all 0.3s ease; }
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #6366f1; color: #ffffff; }
        .sidebar-item.active i { color: #6366f1; }
        
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        code { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .project-card.active { border-color: #6366f1; background: #1e293b; }
        .input-locked { background: #020617 !important; color: #10b981 !important; border-color: #1e293b !important; cursor: default; }

        .gauge-circle { transition: stroke-dashoffset 0.5s ease-out; transform: rotate(-90deg); transform-origin: 50% 50%; }

        .widget-monitor-card { position: absolute; cursor: move; user-select: none; overflow: hidden; min-width: 150px; min-height: 150px; }
        .resize-handle { position: absolute; right: 0; bottom: 0; width: 15px; height: 15px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, #6366f1 50%); border-radius: 0 0 1rem 0; }
        #section-monitor { position: relative; min-height: 80vh; }

        /* Auth Screen Style */
        #auth-gate { display: flex; position: fixed; inset: 0; z-index: 100; background: #0f172a; flex-direction: column; align-items: center; justify-content: center; }
        #main-dashboard { display: none; }
        .auth-input { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; margin-bottom: 12px; font-size: 14px; }
        .auth-input:focus { border-color: #6366f1; }
    </style>
</head>
<body class="flex h-screen text-slate-300">

    <div id="auth-gate">
        <div class="text-center p-8 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl w-96">
            <h1 class="text-2xl font-black mb-6 italic tracking-tighter text-indigo-500">UNI-DASH</h1>
            
            <div id="auth-form-container">
                <div class="flex mb-6 bg-slate-950 p-1 rounded-xl">
                    <button id="tab-login" onclick="toggleAuthMode('login')" class="flex-1 py-2 text-xs font-bold rounded-lg bg-indigo-600 text-white transition">LOGIN</button>
                    <button id="tab-signup" onclick="toggleAuthMode('signup')" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-500 transition">SIGN UP</button>
                </div>

                <div id="auth-loader" class="hidden border-4 border-slate-800 border-t-indigo-500 rounded-full w-8 h-8 animate-spin mx-auto mb-4"></div>
                
                <input type="email" id="auth-email" placeholder="Gmail Address" class="auth-input">
                <input type="password" id="auth-password" placeholder="Password" class="auth-input">
                
                <button id="btn-auth-submit" onclick="handleAuthSubmit()" class="w-full bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-500 transition flex items-center justify-center">
                    <span id="auth-btn-text">Log In</span>
                </button>

                <button id="btn-forgot-password" onclick="handleForgotPassword()" class="mt-4 text-[10px] text-slate-400 hover:text-indigo-400 transition font-bold uppercase tracking-wider">
                    Forgot Password?
                </button>
            </div>

            <p id="auth-msg" class="mt-4 text-[9px] text-slate-500 uppercase font-bold tracking-widest">Multi-User IoT System</p>
        </div>
    </div>

    <div id="main-dashboard" class="w-full h-full flex">
        
        <div id="modal-item" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
            <div class="bg-slate-900 border border-slate-700 w-full max-w-md p-8 rounded-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
                <h3 id="widget-modal-title" class="text-xl font-bold mb-6 text-indigo-400">Add/Edit Widget</h3>
                <input type="hidden" id="edit-widget-id">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Item Name</label>
                        <input id="item-name" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 transition" placeholder="e.g. Pump Switch">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Category & Type</label>
                        <select id="item-type" onchange="toggleMinMax()" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none">
                            <optgroup label="Control" class="bg-slate-900">
                                <option value="switch">Digital Switch (ON/OFF)</option>
                                <option value="button">Push Button (Trigger)</option>
                            </optgroup>
                            <optgroup label="Monitor" class="bg-slate-900">
                                <option value="status">Status Indicator</option>
                                <option value="numeric_gauge">Numeric Gauge</option>
                                <option value="numeric_simple">Numeric Simple</option>
                            </optgroup>
                        </select>
                    </div>
                    <div id="min-max-container" class="hidden grid grid-cols-2 gap-4">
                        <div><label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Min Value</label><input id="item-min" type="number" value="0" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white"></div>
                        <div><label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Max Value</label><input id="item-max" type="number" value="100" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-slate-800 pt-4">
                        <div><label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Gauge Accent Color</label><input id="item-color-accent" type="color" value="#6366f1" class="w-full h-10 bg-slate-800 border border-slate-700 rounded-xl p-1 cursor-pointer"></div>
                        <div><label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Value Text Color</label><input id="item-color-text" type="color" value="#ffffff" class="w-full h-10 bg-slate-800 border border-slate-700 rounded-xl p-1 cursor-pointer"></div>
                    </div>
                </div>
                <div class="flex space-x-3 mt-8">
                    <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 font-semibold transition">Cancel</button>
                    <button onclick="saveItem()" class="flex-1 px-4 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold transition">Save Widget</button>
                </div>
            </div>
        </div>

        <div id="modal-project" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/90 p-4">
            <div class="bg-slate-900 border border-slate-700 w-full max-sm p-8 rounded-2xl shadow-2xl">
                <h3 id="project-modal-title" class="text-xl font-bold mb-6 text-emerald-400">Project</h3>
                <input type="hidden" id="edit-project-id">
                <input id="project-name-input" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none" placeholder="Project Name">
                <div class="flex space-x-3 mt-8">
                    <button onclick="closeProjectModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 text-sm font-semibold">Cancel</button>
                    <button onclick="saveProject()" class="flex-1 px-4 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold transition">Save</button>
                </div>
            </div>
        </div>

        <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col">
            <div class="p-8 text-2xl font-black tracking-tighter text-indigo-500 italic">DANENDRA DB IOT</div>
            <div class="px-6 mb-6">
                <label class="text-[9px] uppercase font-black text-slate-600 tracking-[0.2em] mb-3 block">Selected Project</label>
                <div id="project-list" class="space-y-2 max-h-40 overflow-y-auto mb-4"></div>
                <button onclick="openProjectModal()" class="w-full py-2 border border-dashed border-slate-700 rounded-xl text-[10px] font-bold text-slate-500 hover:text-emerald-400 transition">
                    <i class="fas fa-folder-plus mr-2"></i>New Project
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="switchTab('editor')" id="btn-editor" class="sidebar-item active w-full flex items-center p-4 rounded-xl transition text-sm font-medium"><i class="fas fa-tools w-6"></i><span class="ml-3">Dashboard Editor</span></button>
                <button onclick="switchTab('monitor')" id="btn-monitor" class="sidebar-item w-full flex items-center p-4 rounded-xl transition text-sm font-medium"><i class="fas fa-chart-line w-6"></i><span class="ml-3">Display & Control</span></button>
                <button onclick="switchTab('connection')" id="btn-connection" class="sidebar-item w-full flex items-center p-4 rounded-xl transition border-t border-slate-800/50 mt-4 pt-6 text-sm font-medium"><i class="fas fa-network-wired w-6"></i><span class="ml-3">System Connection</span></button>
                <button id="btn-logout" class="w-full flex items-center p-4 rounded-xl text-red-500 text-sm font-bold hover:bg-red-500/10 transition mt-10"><i class="fas fa-sign-out-alt w-6"></i><span class="ml-3">Logout</span></button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto relative">
            <header class="h-20 border-b border-slate-800 flex items-center justify-between px-10 glass sticky top-0 z-10">
                <div class="flex flex-col">
                    <h2 id="header-title" class="text-xs uppercase tracking-[0.2em] font-black text-slate-400">Dashboard Editor</h2>
                    <div id="active-project-name" class="text-[10px] text-indigo-500 font-bold uppercase mt-1">No Project Selected</div>
                </div>
                <button id="btn-create-widget" onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-full text-[11px] font-black transition uppercase tracking-widest opacity-50 cursor-not-allowed" disabled><i class="fas fa-plus mr-2"></i> Create Widget</button>
            </header>

            <div class="p-10">
                <div id="section-editor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                <div id="section-monitor" class="hidden"></div>
                <div id="section-connection" class="hidden max-w-3xl mx-auto space-y-8">
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
                        <div class="bg-indigo-600 p-6 flex justify-between items-center"><h3 class="text-lg font-bold text-white italic">ESP32 Credentials</h3><button class="bg-white/10 text-white/40 px-4 py-2 rounded-lg text-[10px] font-bold cursor-not-allowed"><i class="fas fa-lock mr-2"></i>LOCKED</button></div>
                        <div class="p-8 space-y-6">
                            <input id="db-url-input" type="text" readonly class="input-locked w-full bg-slate-950 p-3 rounded-xl border border-slate-800 text-xs font-mono">
                            <input id="db-key-input" type="text" readonly class="input-locked w-full bg-slate-950 p-3 rounded-xl border border-slate-800 text-xs font-mono">
                        </div>
                    </div>
                    <div class="bg-slate-900/50 border border-slate-800 rounded-2xl overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="text-[10px] text-slate-500 uppercase bg-slate-950/30"><th class="px-6 py-4">Widget</th><th class="px-6 py-4">Path ID</th></tr></thead>
                            <tbody id="recap-table-body" class="text-[11px]"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7Kowl_t-GyiJCNZI5xVclGgIEvp6i5zo",
            authDomain: "loginsistemdashboard.firebaseapp.com",
            databaseURL: "https://loginsistemdashboard-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "loginsistemdashboard"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const authGate = document.getElementById('auth-gate');
        const mainDashboard = document.getElementById('main-dashboard');
        
        window.userId = null; 
        window.projects = [];
        window.activeProjectId = null;
        let authMode = 'login';

        // --- AUTH LOGIC ---
        window.toggleAuthMode = (mode) => {
            authMode = mode;
            document.getElementById('tab-login').className = mode === 'login' ? 'flex-1 py-2 text-xs font-bold rounded-lg bg-indigo-600 text-white transition' : 'flex-1 py-2 text-xs font-bold rounded-lg text-slate-500 transition';
            document.getElementById('tab-signup').className = mode === 'signup' ? 'flex-1 py-2 text-xs font-bold rounded-lg bg-indigo-600 text-white transition' : 'flex-1 py-2 text-xs font-bold rounded-lg text-slate-500 transition';
            document.getElementById('auth-btn-text').innerText = mode === 'login' ? 'Log In' : 'Sign Up';
            document.getElementById('btn-forgot-password').style.display = mode === 'login' ? 'inline-block' : 'none';
        };

        window.handleAuthSubmit = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const loader = document.getElementById('auth-loader');
            if(!email || !password) return alert("Please fill all fields!");
            loader.classList.remove('hidden');
            try {
                if(authMode === 'signup') {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (e) {
                let msg = "Error: " + e.message;
                if(e.code === "auth/email-already-in-use") msg = "Email sudah terdaftar!";
                if(e.code === "auth/invalid-credential") msg = "Gmail/Password salah!";
                alert(msg);
            }
            loader.classList.add('hidden');
        };

        window.handleForgotPassword = async () => {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Masukkan Gmail kamu!");
            if(confirm(`Kirim link reset ke ${email}?`)) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert("Cek Inbox Gmail kamu.");
                } catch (e) { alert("Gagal: " + e.message); }
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.userId = user.uid;
                authGate.style.display = "none";
                mainDashboard.style.display = "flex";

                // --- MODIFIKASI DISINI: UBAH MANUAL VALUE LINK ---
                // Silahkan ganti isi string di bawah ini sesuai kebutuhan Github Anda secara manual.
                document.getElementById('db-url-input').value = "https://loginsistemdashboard-default-rtdb.asia-southeast1.firebasedatabase.app"; 
                document.getElementById('db-key-input').value = "h8hKp0F3VKUjnOmfXP22XH1SrTfc335FUnN27rAe";
                
                initApp();
            } else {
                window.userId = null;
                authGate.style.display = "flex";
                mainDashboard.style.display = "none";
            }
        });

        document.getElementById('btn-logout').onclick = () => { if(confirm("Logout?")) signOut(auth); };

        // --- DATABASE LOGIC ---
        function initApp() {
            onValue(ref(db, `users/${window.userId}/system_projects`), (snapshot) => {
                const data = snapshot.val();
                window.projects = data ? Object.values(data) : [];
                renderProjects();
                if(window.activeProjectId) renderAll();
            });
        }

        window.saveProject = () => {
            const name = document.getElementById('project-name-input').value;
            const editId = document.getElementById('edit-project-id').value;
            if(!name || !window.userId) return;
            const id = editId || Date.now();
            const slug = name.toLowerCase().replace(/[^a-z0-9]/g, "_");
            update(ref(db, `users/${window.userId}/system_projects/${id}`), { id, name, slug });
            closeProjectModal();
        };

        window.selectProject = (id) => {
            window.activeProjectId = id;
            const proj = window.projects.find(p => p.id == id);
            document.getElementById('active-project-name').innerText = "Active: " + proj.name;
            const btn = document.getElementById('btn-create-widget');
            btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');
            renderProjects(); renderAll();
        };

        window.saveItem = () => {
            const name = document.getElementById('item-name').value;
            const type = document.getElementById('item-type').value;
            const min = parseFloat(document.getElementById('item-min').value) || 0;
            const max = parseFloat(document.getElementById('item-max').value) || 100;
            const colorAccent = document.getElementById('item-color-accent').value;
            const colorText = document.getElementById('item-color-text').value;
            const editId = document.getElementById('edit-widget-id').value;
            if(!name || !window.activeProjectId) return;
            const proj = window.projects.find(p => p.id == window.activeProjectId);
            const id = editId || Date.now();
            const existingWidget = (editId && proj.widgets) ? proj.widgets[editId] : null;
            const pos = existingWidget?.pos || { x: 20, y: 20, w: 250, h: 220 };
            const widgetData = { id, name, type, min, max, colorAccent, colorText, pos,
                slug: existingWidget ? existingWidget.slug : name.toLowerCase().replace(/[^a-z0-9]/g, "_") + "_" + Math.floor(1000 + Math.random()*9000)
            };
            set(ref(db, `users/${window.userId}/system_projects/${window.activeProjectId}/widgets/${id}`), widgetData);
            if(!editId) set(ref(db, `users/${window.userId}/data/${proj.slug}/${widgetData.slug}`), 0);
            closeModal();
        };

        window.deleteWidget = (id) => {
            if(confirm("Hapus widget ini?")) {
                const proj = window.projects.find(p => p.id == window.activeProjectId);
                remove(ref(db, `users/${window.userId}/data/${proj.slug}/${proj.widgets[id].slug}`));
                remove(ref(db, `users/${window.userId}/system_projects/${window.activeProjectId}/widgets/${id}`));
            }
        };

        // UI Interactions
        let activeEl = null, startX, startY, startW, startH, startLeft, startTop, interactionMode = '';
        function initInteractions(el, widgetId) {
            const handle = el.querySelector('.resize-handle');
            el.onmousedown = (e) => {
                if (e.target.closest('button') || e.target.closest('input')) return;
                interactionMode = 'drag'; activeEl = el; startX = e.clientX; startY = e.clientY;
                startLeft = el.offsetLeft; startTop = el.offsetTop;
                document.onmousemove = doInteraction; document.onmouseup = stopInteraction;
            };
            handle.onmousedown = (e) => {
                e.stopPropagation(); interactionMode = 'resize'; activeEl = el;
                startX = e.clientX; startY = e.clientY;
                startW = el.offsetWidth; startH = el.offsetHeight;
                document.onmousemove = doInteraction; document.onmouseup = stopInteraction;
            };
        }
        function doInteraction(e) {
            if (!activeEl) return;
            if (interactionMode === 'drag') {
                activeEl.style.left = (startLeft + e.clientX - startX) + 'px';
                activeEl.style.top = (startTop + e.clientY - startY) + 'px';
            } else if (interactionMode === 'resize') {
                activeEl.style.width = (startW + e.clientX - startX) + 'px';
                activeEl.style.height = (startH + e.clientY - startY) + 'px';
            }
        }
        function stopInteraction() {
            if (activeEl) {
                const id = activeEl.id.split('-')[1];
                update(ref(db, `users/${window.userId}/system_projects/${window.activeProjectId}/widgets/${id}/pos`), {
                    x: parseInt(activeEl.style.left), y: parseInt(activeEl.style.top),
                    w: activeEl.offsetWidth, h: activeEl.offsetHeight
                });
            }
            activeEl = null; document.onmousemove = null;
        }

        window.renderAll = () => {
            const editorGrid = document.getElementById('section-editor');
            const monitorGrid = document.getElementById('section-monitor');
            const tableBody = document.getElementById('recap-table-body');
            editorGrid.innerHTML = ''; monitorGrid.innerHTML = ''; tableBody.innerHTML = '';
            const currentProj = window.projects.find(p => p.id == window.activeProjectId);
            if(!currentProj || !currentProj.widgets) return;
            Object.values(currentProj.widgets).forEach(w => {
                const fullPath = `users/${window.userId}/data/${currentProj.slug}/${w.slug}`;
                editorGrid.innerHTML += `<div class="bg-slate-800/30 border border-slate-700/50 p-6 rounded-2xl shadow-lg group"><div class="flex justify-between items-start"><div><div class="text-[9px] text-indigo-400 font-bold uppercase mb-1">${w.type}</div><div class="font-bold text-white">${w.name}</div></div><div class="flex space-x-2"><button onclick="openModal(${w.id})" class="text-slate-700 hover:text-emerald-400"><i class="fas fa-edit"></i></button><button onclick="deleteWidget(${w.id})" class="text-slate-700 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></div></div><div class="bg-slate-950/80 rounded-xl p-3 border border-slate-800 flex justify-between items-center mt-4"><code class="text-[10px] text-emerald-500 truncate mr-2">${fullPath}</code></div></div>`;
                const card = document.createElement('div');
                card.id = `monitor-${w.id}`; card.className = 'widget-monitor-card bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-2xl flex flex-col';
                card.style.left = (w.pos?.x || 0) + 'px'; card.style.top = (w.pos?.y || 0) + 'px';
                card.style.width = (w.pos?.w || 250) + 'px'; card.style.height = (w.pos?.h || 220) + 'px';
                card.innerHTML = `<div class="content flex-1"></div><div class="resize-handle"></div>`;
                monitorGrid.appendChild(card);
                initInteractions(card, w.id);
                onValue(ref(db, fullPath), (snapshot) => {
                    const val = snapshot.val() || 0;
                    card.querySelector('.content').innerHTML = createMonitorUI(w, val);
                });
                tableBody.innerHTML += `<tr class="border-t border-slate-800/50"><td class="px-6 py-4 font-bold text-center">${w.name}</td><td class="px-6 py-4 text-center"><code class="text-emerald-400">${fullPath}</code></td></tr>`;
            });
        };

        function createMonitorUI(w, val) {
            const accent = w.colorAccent || '#6366f1';
            const textCol = w.colorText || '#ffffff';
            let inner = '';
            if(w.type === 'switch') {
                inner = `<div onclick="toggleSwitch('${w.slug}', ${val})" class="mt-4 flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 cursor-pointer"><span class="text-[10px] font-bold" style="color:${accent}">${val == 1 ? 'ON' : 'OFF'}</span><div class="w-10 h-5 rounded-full relative p-1" style="background-color:${val == 1 ? accent : '#334155'}"><div class="w-3 h-3 bg-white rounded-full transition-all transform ${val == 1 ? 'translate-x-5' : ''}"></div></div></div>`;
            } else if (w.type === 'numeric_gauge') {
                const percent = Math.min(Math.max(((val - w.min) / (w.max - w.min)) * 100, 0), 100);
                inner = `<div class="mt-2 flex flex-col items-center justify-center relative h-full"><svg viewBox="0 0 100 100" class="w-full h-full max-h-[120px]"><circle cx="50" cy="50" r="40" stroke="#1e293b" stroke-width="8" fill="transparent" /><circle cx="50" cy="50" r="40" stroke="${accent}" stroke-width="8" fill="transparent" stroke-dasharray="251.2" stroke-dashoffset="${251.2 - (251.2 * percent) / 100}" class="gauge-circle" stroke-linecap="round" /></svg><div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-2xl font-black" style="color:${textCol}">${val}</span></div></div>`;
            } else if (w.type === 'numeric_simple') {
                inner = `<div class="h-full flex items-center justify-center"><span class="text-4xl font-black" style="color:${textCol}">${val}</span></div>`;
            } else if (w.type === 'status') {
                inner = `<div class="mt-4 flex items-center space-x-3 bg-slate-950/50 p-3 rounded-xl border border-slate-800"><div class="w-2.5 h-2.5 rounded-full ${val == 1 ? 'animate-pulse' : ''}" style="background-color:${val == 1 ? accent : '#334155'}"></div><span class="text-[10px] uppercase font-bold" style="color:${val == 1 ? textCol : '#64748b'}">${val == 1 ? 'Active' : 'Inactive'}</span></div>`;
            } else if (w.type === 'button') {
                inner = `<button onmousedown="pushButton('${w.slug}', 1)" onmouseup="pushButton('${w.slug}', 0)" class="w-full mt-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest select-none transition-all active:scale-95" style="background:${accent}22; color:${accent}; border: 1px solid ${accent}44">Trigger</button>`;
            }
            return `<div class="text-[9px] text-slate-500 uppercase font-black mb-1 text-center">${w.type}</div><div class="text-xs font-bold text-slate-200 truncate text-center">${w.name}</div>${inner}`;
        }

        window.toggleSwitch = (slug, cur) => {
            const proj = window.projects.find(p => p.id == window.activeProjectId);
            set(ref(db, `users/${window.userId}/data/${proj.slug}/${slug}`), cur == 1 ? 0 : 1);
        };
        window.pushButton = (slug, val) => {
            const proj = window.projects.find(p => p.id == window.activeProjectId);
            set(ref(db, `users/${window.userId}/data/${proj.slug}/${slug}`), val);
        };

        window.renderProjects = () => {
            const container = document.getElementById('project-list'); container.innerHTML = '';
            window.projects.forEach(p => {
                const isActive = window.activeProjectId == p.id;
                container.innerHTML += `<div onclick="selectProject(${p.id})" class="group flex items-center justify-between p-3 rounded-xl border border-slate-800 cursor-pointer ${isActive ? 'bg-indigo-600/20 border-indigo-500' : 'hover:bg-slate-900'}"><span class="text-[11px] font-bold truncate ${isActive ? 'text-white' : 'text-slate-400'} text-center">${p.name}</span></div>`;
            });
        };
        window.openProjectModal = () => document.getElementById('modal-project').classList.remove('hidden');
        window.closeProjectModal = () => document.getElementById('modal-project').classList.add('hidden');
        window.openModal = (id = null) => {
            if(id) {
                const p = window.projects.find(proj => proj.id == window.activeProjectId);
                const w = p.widgets[id];
                document.getElementById('edit-widget-id').value = id; document.getElementById('item-name').value = w.name;
                document.getElementById('item-type').value = w.type; document.getElementById('item-min').value = w.min || 0;
                document.getElementById('item-max').value = w.max || 100; document.getElementById('item-color-accent').value = w.colorAccent || '#6366f1';
                document.getElementById('item-color-text').value = w.colorText || '#ffffff';
            } else { document.getElementById('edit-widget-id').value = ''; document.getElementById('item-name').value = ''; }
            toggleMinMax(); document.getElementById('modal-item').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modal-item').classList.add('hidden');
        window.toggleMinMax = () => {
            const type = document.getElementById('item-type').value;
            document.getElementById('min-max-container').style.display = (type === 'numeric_gauge') ? 'grid' : 'none';
        };
        window.switchTab = (tab) => {
            ['section-editor', 'section-monitor', 'section-connection'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');
            document.getElementById('header-title').innerText = tab.toUpperCase();
        };
    </script>
</body>
</html>
